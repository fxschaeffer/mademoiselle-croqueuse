<!DOCTYPE html>
<html lang="fr">
<head>

<title>Mademoiselle Croqueuse - Classements</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

const db = firebase.database();

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; color: #fff; font-family: 'Courier New', monospace; min-height: 100vh; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; color: #ff69b4; font-size: 28px; margin: 20px 0;
  text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4; }
h2 { color: #0ff; font-size: 18px; margin: 20px 0 10px; text-shadow: 0 0 5px #0ff; }
.back-link { display: inline-block; margin: 10px 0; color: #0ff; text-decoration: none;
  border: 1px solid #0ff; padding: 8px 16px; border-radius: 4px; font-size: 14px; }
.back-link:hover { background: #0ff2; }
.boards { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
.board { flex: 1; min-width: 300px; max-width: 380px; background: #111; border: 1px solid #333;
  border-radius: 8px; padding: 15px; }
.board h2 { text-align: center; margin-top: 0; }
table { width: 100%; border-collapse: collapse; }
th { color: #888; font-size: 12px; text-align: left; padding: 6px 4px; border-bottom: 1px solid #333; }
th:last-child { text-align: right; }
td { padding: 8px 4px; border-bottom: 1px solid #1a1a2e; font-size: 14px; }
td:last-child { text-align: right; color: #ffd700; font-weight: bold; }
.rank { color: #888; width: 30px; }
.rank-1 { color: #ffd700; }
.rank-2 { color: #c0c0c0; }
.rank-3 { color: #cd7f32; }
.player-name { display: flex; align-items: center; gap: 8px; }
.player-photo { width: 24px; height: 24px; border-radius: 50%; }
.verified { color: #0f0; font-size: 12px; }
.empty { color: #444; text-align: center; padding: 20px; font-style: italic; }
.stats { margin-top: 30px; background: #111; border: 1px solid #333; border-radius: 8px; padding: 15px; }
.stats h2 { text-align: center; margin-top: 0; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
.stat-card { background: #0a0a2e; border: 1px solid #1a1a4e; border-radius: 6px; padding: 12px; text-align: center; }
.stat-value { font-size: 24px; color: #ffd700; font-weight: bold; }
.stat-label { font-size: 11px; color: #888; margin-top: 4px; }
.filter-bar { display: flex; gap: 10px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
.filter-btn { background: #1a1a2e; border: 1px solid #333; color: #0ff; padding: 6px 14px;
  border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; }
.filter-btn.active { background: #0ff3; border-color: #0ff; }
.filter-btn:hover { background: #0ff2; }
</style>
</head>
<body>
<div class="container">
  <h1>🏆 MADEMOISELLE CROQUEUSE 🏆</h1>
  <div style="text-align:center"><a href="index.html" class="back-link">← Retour au jeu</a></div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all')">Tous</button>
    <button class="filter-btn" onclick="setFilter('today')">Aujourd'hui</button>
    <button class="filter-btn" onclick="setFilter('week')">Cette semaine</button>
    <button class="filter-btn" onclick="setFilter('month')">Ce mois</button>
  </div>

  <div class="boards">
    <div class="board">
      <h2>🏆 Classement Officiel</h2>
      <table>
        <thead><tr><th>#</th><th>Joueur</th><th>Score</th></tr></thead>
        <tbody id="officialBoard"><tr><td colspan="3" class="empty">Chargement...</td></tr></tbody>
      </table>
    </div>
    <div class="board">
      <h2>🎮 Classement Arcade</h2>
      <table>
        <thead><tr><th>#</th><th>Joueur</th><th>Score</th></tr></thead>
        <tbody id="arcadeBoard"><tr><td colspan="3" class="empty">Chargement...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="stats">
    <h2>📊 Statistiques</h2>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-value" id="statTotal">-</div><div class="stat-label">Parties jouees</div></div>
      <div class="stat-card"><div class="stat-value" id="statHighest">-</div><div class="stat-label">Meilleur score</div></div>
      <div class="stat-card"><div class="stat-value" id="statPlayers">-</div><div class="stat-label">Joueurs</div></div>
      <div class="stat-card"><div class="stat-value" id="statAvg">-</div><div class="stat-label">Score moyen</div></div>
    </div>
  </div>
</div>

<script>
let allOfficialScores = [];
let allArcadeScores = [];
let currentFilter = 'all';

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderBoards();
}

function filterByTime(scores) {
  if (currentFilter === 'all') return scores;
  const now = Date.now();
  const limits = { today: 86400000, week: 604800000, month: 2592000000 };
  return scores.filter(s => s.timestamp && (now - s.timestamp) < limits[currentFilter]);
}

function renderBoard(elementId, scores) {
  const el = document.getElementById(elementId);
  const filtered = filterByTime(scores).sort((a, b) => b.score - a.score).slice(0, 20);
  if (filtered.length === 0) {
    el.innerHTML = '<tr><td colspan="3" class="empty">Pas encore de scores</td></tr>';
    return;
  }
  el.innerHTML = filtered.map((s, i) => {
    const rankClass = i < 3 ? ' rank-' + (i + 1) : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    const nameHtml = s.photoURL
      ? `<span class="player-name"><img src="${s.photoURL}" class="player-photo">${s.name} <span class="verified">✓</span></span>`
      : `<span class="player-name">${s.name}</span>`;
    const date = s.timestamp ? new Date(s.timestamp).toLocaleDateString('fr') : '';
    return `<tr><td class="rank${rankClass}">${medal}</td><td>${nameHtml}<br><small style="color:#555">${date}</small></td><td>${s.score.toLocaleString()}</td></tr>`;
  }).join('');
}

function renderBoards() {
  renderBoard('officialBoard', allOfficialScores);
  renderBoard('arcadeBoard', allArcadeScores);
  updateStats();
}

function updateStats() {
  const all = [...allOfficialScores, ...allArcadeScores];
  const filtered = filterByTime(all);
  document.getElementById('statTotal').textContent = filtered.length;
  document.getElementById('statHighest').textContent = filtered.length ? Math.max(...filtered.map(s => s.score)).toLocaleString() : '-';
  const players = new Set(filtered.map(s => s.name));
  document.getElementById('statPlayers').textContent = players.size;
  const avg = filtered.length ? Math.round(filtered.reduce((a, b) => a + b.score, 0) / filtered.length) : 0;
  document.getElementById('statAvg').textContent = avg.toLocaleString();
}

// Load from Firebase
db.ref('scores_official').orderByChild('score').limitToLast(50).on('value', snap => {
  allOfficialScores = [];
  snap.forEach(c => { allOfficialScores.push(c.val()); });
  renderBoards();
});

db.ref('scores_arcade').orderByChild('score').limitToLast(50).on('value', snap => {
  allArcadeScores = [];
  snap.forEach(c => { allArcadeScores.push(c.val()); });
  renderBoards();
});
</script>
</body>
</html>
